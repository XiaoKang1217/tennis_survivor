name: Update Current Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/fetch_current.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update current data"
          file_pattern: "data/current.json"
