name: Update Daily Data

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/fetch_history.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update daily history data"
          file_pattern: "data/history.json"
