<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>签表幸存者之炉网</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans SC","Microsoft YaHei",sans-serif;background:linear-gradient(160deg,#fffbf0,#fff7e6,#fef3c7);min-height:100vh;color:#44321c;font-size:14px}
#hdr{background:linear-gradient(135deg,#f59e0b,#f97316,#ef4444);padding:13px 20px;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(245,158,11,.4)}
.hdt{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px}
#hdr h1{font-size:1.2em;font-weight:800;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.2)}
.upd{color:rgba(255,255,255,.8);font-size:11px}
.tabs{display:flex;gap:4px;margin-top:9px;flex-wrap:wrap}
.tab{padding:5px 12px;border:2px solid rgba(255,255,255,.4);border-radius:20px;cursor:pointer;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);font-size:12px;font-weight:700;transition:all .2s}
.tab.on{background:#fff;color:#f59e0b;border-color:#fff;box-shadow:0 3px 10px rgba(0,0,0,.15)}
.tab:hover:not(.on){background:rgba(255,255,255,.3)}
.main{padding:15px 20px}
.panel{display:none}.panel.on{display:block}
.kpi{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.kc{background:#fff;border:1px solid #fde68a;border-radius:10px;padding:9px 13px;min-width:88px;text-align:center;box-shadow:0 2px 8px rgba(245,158,11,.1)}
.kn{font-size:1.5em;font-weight:800;line-height:1.1}.kl{font-size:11px;color:#9a7a40;margin-top:3px}
.nt{color:#f59e0b}.na{color:#16a34a}.nd{color:#dc2626}
.toolbar{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.toolbar input{padding:6px 12px;border-radius:20px;border:2px solid #fde68a;background:#fffbf0;color:#44321c;font-size:13px;width:160px}
.toolbar input:focus{outline:none;border-color:#f59e0b}
.fbtn{padding:5px 12px;border-radius:20px;border:2px solid #fde68a;background:#fff;color:#9a7a40;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.fbtn.on{border-color:#f59e0b;background:#f59e0b;color:#fff}
.fbtn:hover:not(.on){border-color:#f97316;color:#f97316}
.tbl-wrap{overflow:auto;border-radius:10px;border:1px solid #fde68a;box-shadow:0 2px 12px rgba(245,158,11,.1);max-height:calc(100vh - 260px)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,#fef3c7,#fde68a)}
th{padding:10px 11px;text-align:left;color:#78450a;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid #fcd34d;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:rgba(245,158,11,.2)}
th.sa::after{content:" ⬇";color:#f59e0b}
th.sd::after{content:" ⬆";color:#f59e0b}
td{padding:8px 11px;border-bottom:1px solid #fef9f0;vertical-align:middle}
.ra{background:rgba(22,163,74,.04)}.rd{background:#fff}
tr.pref-row:hover td{background:rgba(245,158,11,.12)!important;cursor:pointer}
tr[data-status]:hover td{background:rgba(245,158,11,.07)!important}
.tn{text-align:center;font-weight:600}.tc{text-align:center}
.tu{font-weight:600;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#78450a}
.tt .pn{color:#d97706;font-weight:700}.tt .pa{display:block;color:#9ca3af;font-size:11px;margin-top:1px}
.nf{font-style:italic;color:#d1b896;font-size:11px}
.ir{color:#7c3aed!important}.y{color:#d97706!important;font-weight:700!important}
.r{color:#dc2626!important}.g{color:#16a34a!important}.s{color:#6b7280!important;font-weight:400!important}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap}
.ba{background:#dcfce7;color:#15803d;border:1px solid #86efac}
.bl{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5}
.bw{background:#fef9c3;color:#a16207;border:1px solid #fde047}
.bs{background:#f3f4f6;color:#6b7280;border:1px solid #d1d5db}
.cu{color:#16a34a;font-weight:800}.cd{color:#dc2626;font-weight:800}
.cn{color:#9ca3af}.cz{color:#6b7280}
.sc{background:#fff;border:1px solid #fde68a;border-radius:10px;padding:12px;margin-bottom:14px;box-shadow:0 2px 10px rgba(245,158,11,.1)}
.sch{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px;font-weight:700;color:#78450a;font-size:13px}
.scs{color:#9a7a40;font-size:12px;font-weight:500}
.st{width:100%;border-collapse:collapse;font-size:13px}
.st th{color:#9a7a40;font-size:11px;text-transform:uppercase;padding:5px 10px;border-bottom:1px solid #fde68a;text-align:left}
.st td{padding:6px 10px;border-bottom:1px solid #fef9f0}
.psr{color:#9a7a40;font-size:12px;font-weight:700;text-align:center;width:32px}
.psp{font-weight:700;color:#44321c}.psc{text-align:center;font-weight:700;color:#d97706}
.psp2{text-align:center;color:#9a7a40;font-size:12px}
.psb{padding-right:8px;min-width:80px}
.bbar{height:9px;border-radius:4px;min-width:2px}
.divider{border:none;border-top:2px dashed #fde68a;margin:14px 0}
.tp{max-width:200px;font-size:12px;color:#78450a;line-height:1.5}
.tw{font-weight:700;color:#44321c;max-width:150px}
/* 展开行 */
.exp-row{display:none;background:#fffbf0!important}
.exp-row.open{display:table-row}
.exp-inner{padding:12px 14px;border-top:2px dashed #fde68a}
.exp-grid{display:flex;flex-wrap:wrap;gap:10px}
.exp-sec{background:#fff;border:1px solid #fde68a;border-radius:8px;padding:9px 13px;min-width:160px;flex:1}
.exp-sec h5{font-size:11px;color:#9a7a40;text-transform:uppercase;font-weight:700;margin-bottom:6px;border-bottom:1px solid #fde68a;padding-bottom:4px}
.exp-tags{display:flex;flex-wrap:wrap;gap:4px}
.et{background:#fef3c7;border:1px solid #fcd34d;border-radius:12px;padding:2px 8px;font-size:12px;color:#78450a;white-space:nowrap}
.et.r{background:#fee2e2;border-color:#fca5a5;color:#dc2626}
.et.g{background:#dcfce7;border-color:#86efac;color:#15803d}
.exp-sub{margin-bottom:7px}
.exp-sub-t{font-size:12px;font-weight:700;color:#44321c;margin-bottom:4px}
/* 运势 */
.fortune-wrap{max-width:580px;margin:0 auto;text-align:center;padding:16px 0}
.fortune-title{font-size:1.5em;font-weight:800;color:#78450a;margin-bottom:5px}
.fortune-sub{color:#9a7a40;font-size:12px;margin-bottom:20px}
.fortune-tabs{display:flex;justify-content:center;gap:10px;margin-bottom:20px}
.ftab{padding:7px 22px;border:2px solid #fde68a;border-radius:20px;cursor:pointer;background:#fff;color:#9a7a40;font-weight:700;font-size:13px;transition:all .2s}
.ftab.on{background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;border-color:transparent;box-shadow:0 4px 15px rgba(245,158,11,.4)}
.fortune-card{background:#fff;border:2px solid #fde68a;border-radius:16px;padding:28px;box-shadow:0 8px 30px rgba(245,158,11,.15);min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:all .3s}
.fortune-card.shake{animation:sk .5s ease}
@keyframes sk{0%,100%{transform:rotate(0)}20%,60%{transform:rotate(-3deg)}40%,80%{transform:rotate(3deg)}}
.fortune-player{font-size:2em;font-weight:900;color:#f59e0b;letter-spacing:2px}
.fortune-text{font-size:13px;color:#78450a;line-height:1.8;max-width:380px;padding:10px 14px;background:#fef9f0;border-radius:10px;border-left:4px solid #f59e0b}
.fortune-btn{padding:11px 32px;background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 15px rgba(245,158,11,.4);transition:all .2s;margin-top:4px}
.fortune-btn:hover{transform:translateY(-2px)}.fortune-btn:active{transform:translateY(0)}
.fortune-hint{color:#9a7a40;font-size:11px}
.exp-tag{background:#fef3c7;border:1px solid #fcd34d;border-radius:12px;padding:2px 8px;font-size:12px;color:#78450a;white-space:nowrap;display:inline-block;margin:2px}
.exp-tag.r{background:#fee2e2;border-color:#fca5a5;color:#dc2626}
.exp-tag.g{background:#dcfce7;border-color:#86efac;color:#15803d}

.refresh-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:rgba(255,255,255,.8);margin-top:4px}
.refresh-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.loading{text-align:center;padding:40px;color:#9a7a40;font-size:16px}
.dev{color:rgba(255,255,255,.86);font-size:11px;margin-left:10px}.upd-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.select-mini{padding:5px 12px;border-radius:20px;border:2px solid #fde68a;background:#fff;color:#9a7a40;font-size:12px;font-weight:700}.yearbar,.flight-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}.flight-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}.flight-card{background:#fff;border:1px solid #fde68a;border-radius:12px;padding:12px;box-shadow:0 2px 10px rgba(245,158,11,.1)}.flight-day{font-size:18px;font-weight:900;color:#d97706}.flight-pill{background:#fef3c7;border:1px solid #fcd34d;border-radius:12px;padding:2px 8px;font-size:12px;color:#78450a;font-weight:700;display:inline-block;margin:2px}.flight-pill.r{background:#fee2e2;border-color:#fca5a5;color:#dc2626}.fattr{font-size:13px;font-weight:900;color:#d97706;background:#fef3c7;border:1px solid #fcd34d;border-radius:14px;padding:3px 12px}.fortune-yi{font-size:12px;color:#9a7a40;line-height:1.8}.fortune-text{max-width:460px}.dev-note{font-size:11px;color:#9a7a40}

@media(max-width:768px){
  body{font-size:13px}
  #hdr{padding:10px 12px}
  #hdr h1{font-size:1.05em}
  .hdt{align-items:flex-start}
  .tabs{gap:5px;overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}
  .tab{white-space:nowrap;padding:6px 10px;font-size:12px}
  .main{padding:10px}
  .kpi{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
  .kc{min-width:0;padding:8px}
  .kn{font-size:1.35em}
  .toolbar{position:sticky;top:88px;background:#fff7e6cc;z-index:20;padding:6px;border-radius:10px;backdrop-filter:blur(6px)}
  .toolbar input{width:130px;flex:1}
  .tbl-wrap{max-height:none;border-radius:8px}
  table{font-size:12px;min-width:820px}
  th,td{padding:7px 8px}
  .tu{max-width:120px}
  .fortune-wrap{padding:8px 0}
  .fortune-card{padding:18px;min-height:210px}
  .fortune-player{font-size:1.55em}
  .fortune-text{font-size:12px}
  .flight-grid{grid-template-columns:1fr}
}







/* mobile live sheet fix: remove forced 820px min-width, fix banner+kpi+stats only */
@media(max-width:768px){
  #p-ms-s table,#p-ws-s table{min-width:0!important}
  #p-ms-s .sc,#p-ws-s .sc{
    box-sizing:border-box;
    width:100%;
    padding:10px 10px 8px;
    margin:8px 0 10px;
  }
  #p-ms-s .sch,#p-ws-s .sch{
    display:block;
    margin-bottom:8px;
  }
  #p-ms-s .sch>span:first-child,#p-ws-s .sch>span:first-child{
    display:block;
    font-size:13px;
    font-weight:800;
    margin-bottom:3px;
  }
  #p-ms-s .sch .scs,#p-ws-s .sch .scs{
    display:inline-block;
    margin-top:2px;
    padding:2px 8px;
    border-radius:999px;
    background:#fff7ed;
    border:1px solid #fed7aa;
    color:#9a3412;
    font-size:11px;
    font-weight:700;
  }
  #p-ms-s .kpi,#p-ws-s .kpi{
    display:grid!important;
    grid-template-columns:repeat(3,minmax(0,1fr))!important;
    gap:6px;
    margin-bottom:10px;
  }
  #p-ms-s .kpi .kc,#p-ws-s .kpi .kc{
    min-width:0;
    padding:7px 4px;
    border-radius:10px;
    box-sizing:border-box;
  }
  #p-ms-s .kpi .kn,#p-ws-s .kpi .kn{
    font-size:1.1em;
  }
  #p-ms-s .kpi .kl,#p-ws-s .kpi .kl{
    font-size:10px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
}


/* ===== 积分构成 ===== */

.bd-stat-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}

.bd-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.bd-toolbar input{padding:6px 12px;border-radius:18px;border:2px solid #fde68a;background:#fffbf0;color:#44321c;font-size:13px;flex:1;max-width:220px;outline:none}
.bd-toolbar input:focus{border-color:#f59e0b}

// ===== 数据加载 =====
async function loadData(){
  const t=Date.now();
  // ── 并行发起全部3个请求，不互相阻塞 ─────────────────────
  const curPromise=fetch('data/current.json?t='+t).then(r=>r.json());
  window.__histPromise=fetch('data/history.json?t='+t).then(r=>r.json());
  window.__bdPromise=fetch('data/breakdown.json?t='+t).then(r=>r.json());

  // ① current 先到先渲染（最小，最快）
  try{
    const cur=await curPromise;
    GDATA=cur;
    MSPOOL=(cur.ms&&cur.ms.today_pool)||[];
    WSPOOL=(cur.ws&&cur.ws.today_pool)||[];
    document.getElementById('upd-time').textContent='⏱ '+(cur.updated_at||'')+'｜每30分钟更新';
    if(cur.ms){document.getElementById('tab-ms-s').textContent='🎾 ATP '+(cur.ms.event_name||'')+(cur.ms.today_day?' Day'+cur.ms.today_day:'');renderScore('ms', cur.ms);}
    if(cur.ws){document.getElementById('tab-ws-s').textContent='🎾 WTA '+(cur.ws.event_name||'')+(cur.ws.today_day?' Day'+cur.ws.today_day:'');renderScore('ws', cur.ws);}
  }catch(e){
    console.error('实时数据加载失败',e);
    document.getElementById('upd-time').textContent='⚠️ 实时数据加载失败，请刷新';
    document.getElementById('loading-ms').textContent='⚠️ 数据加载失败，请刷新页面';
    document.getElementById('loading-ws').textContent='⚠️ 数据加载失败，请刷新页面';
  }

  // ② history 后台加载完自动渲染
  window.__histPromise.then(function(hist){
    HIST_DATA=hist;
    const pref={updated_at:hist.updated_at||'',ms:hist.preference_by_year['2026'].ms,ws:hist.preference_by_year['2026'].ws};
    PDATA=pref;
    renderPref('ms',pref);renderPref('ws',pref);
    renderDisaster('ms');renderDisaster('ws');
    initFlightSelect();
  }).catch(function(e){
    console.warn('历史数据加载失败（非致命）',e);
    document.getElementById('loading-msp').textContent='⚠️ 历史数据加载失败，请刷新';
    document.getElementById('loading-wsp').textContent='⚠️ 历史数据加载失败，请刷新';
  });

  // ③ breakdown 后台加载完，若用户已切到积分构成tab则自动渲染
  window.__bdPromise.then(function(d){
    BD_DATA=applyCurrentToBreakdown(d);
    // 下载完直接预渲染两个panel，无论用户在哪个tab，切过去秒出
    renderBreakdownPanel('ms',BD_DATA.ms||[]);
    renderBreakdownPanel('ws',BD_DATA.ws||[]);
  }).catch(function(e){console.warn('积分构成数据加载失败',e);});
}

// 统一获取历史数据入口（复用已发起的请求）
function loadHistData(cb){
  if(HIST_DATA){if(cb)cb(HIST_DATA);return;}
  const p=window.__histPromise;
  if(p){p.then(function(d){if(cb)cb(d);}).catch(function(){});return;}
  window.__histPromise=fetch('data/history.json?t='+Date.now()).then(r=>r.json());
  window.__histPromise.then(function(d){HIST_DATA=d;if(cb)cb(d);});
}

async function refreshCurrentOnly(){
  try{
    const cur=await fetch('data/current.json?t='+Date.now()).then(r=>r.json());
    GDATA=cur;
    MSPOOL=cur.ms.today_pool||[];
    WSPOOL=cur.ws.today_pool||[];
    document.getElementById('upd-time').textContent='⏱ '+cur.updated_at+'｜每30分钟更新';
    document.getElementById('tab-ms-s').textContent='🎾 ATP '+cur.ms.event_name+' Day'+cur.ms.today_day;
    document.getElementById('tab-ws-s').textContent='🎾 WTA '+cur.ws.event_name+' Day'+cur.ws.today_day;
    renderScore('ms', cur.ms);
    renderScore('ws', cur.ws);
    // 实时数据刷新后，同步覆盖积分构成中的即时积分与本站得分
    if(BD_DATA){rerenderBreakdownIfReady();}
    document.getElementById('rdot').style.background='#4ade80';
    setTimeout(()=>document.getElementById('rdot').style.background='#4ade80',2000);
  }catch(e){document.getElementById('rdot').style.background='#f87171';}
}

setInterval(refreshCurrentOnly, 30*60*1000);

// ===== 渲染实时得分 =====
function renderScore(g, data){
  const cont=document.getElementById('content-'+g+'-s');
  const loading=document.getElementById('loading-'+(g=='ms'?'ms':'ws'));
  if(loading) loading.style.display='none';
  const rows=data.rows||[];
  const totalUsers=rows.length;
  const siteRows=rows.filter(r=>r.fill_status!=='未参赛' && !r.not_participated);
  const siteTotal=siteRows.length;
  const alive=siteRows.filter(r=>r.fill_status==='存活'||r.status===2).length;
  const filled=data.filled_count||siteRows.filter(r=>r.has_today&&r.today_player&&r.today_player!=='轮空').length;
  const suicide=siteRows.filter(r=>String(r.fill_status||'').includes('自杀')).length;
  const total=siteTotal;
  const stats=data.player_stats||[];
  
  // 今日选人统计
  const ccArr=['#f59e0b','#f97316','#ef4444','#8b5cf6','#10b981','#3b82f6'];
  const aliveFilled=stats.reduce((s,it)=>s+it[1],0)||1;
  const statsHtml=stats.length?`<div class="sc"><div class="sch"><span>📊 今日选人统计（仅存活）—${g=='ms'?'ATP男单':'WTA女单'}Day${data.today_day}</span><span class="scs">存活${alive}人·今日已填${aliveFilled}人</span></div><table class="st"><thead><tr><th></th><th>选手</th><th>人数</th><th>占比</th><th>分布</th></tr></thead><tbody>${stats.map((it,i)=>`<tr><td class="psr">#${i+1}</td><td class="psp">${it[0]}</td><td class="psc">${it[1]}人</td><td class="psp2">${(it[1]/aliveFilled*100).toFixed(1)}%</td><td class="psb"><div class="bbar" style="width:${(it[1]/aliveFilled*100).toFixed(1)}%;background:${ccArr[i%6]}"></div></td></tr>`).join('')}</tbody></table></div><hr class="divider">`:'' ;
  
  // KPI
  const kpi=`<div class="kpi"><div class="kc"><div class="kn nt">${totalUsers}</div><div class="kl">总人数</div></div><div class="kc"><div class="kn nt">${siteTotal}</div><div class="kl">本站参赛</div></div><div class="kc"><div class="kn na">${alive}</div><div class="kl">🟢存活</div></div><div class="kc"><div class="kn nd">${siteTotal-alive}</div><div class="kl">❌出局</div></div><div class="kc"><div class="kn" style="color:#7c3aed">${filled}</div><div class="kl">今日已填</div></div><div class="kc"><div class="kn nd">${suicide}</div><div class="kl">自杀</div></div></div>`;
  
  // 表格行
  const tb_id='tb-'+g+'-s';
  const tbl_id='tbl-'+g+'-s';
  const tab=g+'-s';
  let rowsHtml='';
  for(const r of rows){
    const sc=getStatusClass(r.fill_status,r.status);
    const badge=getBadge(r.fill_status,r.status,sc);
    const td = r.has_today
      ? ((r.today_player && r.today_player !== '轮空')
          ? `<span class="pn">${r.today_player}</span>` + (r.today_player_alt ? `<span class="pa">备：${r.today_player_alt}</span>` : '')
          : '<span class="nf">未填写</span>')
      : '<span class="nf">未填写</span>';
    const chg=r.rank_change;
    const ch=chg===null?'<span class="cn">—</span>':chg>0?`<span class="cu">▲${chg}</span>`:chg<0?`<span class="cd">▼${Math.abs(chg)}</span>`:'<span class="cz">→0</span>';
    const cr=r.current_rank||9999; const ir=r.instant_rank||9999;
    const plEnc=encodeURIComponent(JSON.stringify(r.players||[]));rowsHtml+=`<tr class="${sc==='alive'?'ra':'rd'}" data-status="${sc}" data-filled="${r.has_today?'1':'0'}" data-cr="${cr}" data-ir="${ir}" data-cur="${r.current_score||0}" data-deduct="${r.deduct_score||0}" data-this="${r.this_event_score||0}" data-instant="${r.instant_score||0}" data-day="${r.day||0}" data-chg="${r.rank_change||0}" data-user="${esc(r.username)}" data-today="${esc(r.today_player||'')}" data-alive="${sc==='alive'?1:0}" data-pl="${plEnc}" onclick="toggleSdr(this)" style="cursor:pointer"><td class="tn" data-label="当前排名">${cr==9999?'—':cr}</td><td class="tn ir" data-label="即时排名">${ir==9999?'—':ir}</td><td class="tu" data-label="用户名" data-rank="当前#${cr==9999?'—':cr} · 即时#${ir==9999?'—':ir}">${r.username}</td><td class="tt" data-label="今日选择">${td}</td><td data-label="状态">${badge}</td><td class="tn g" data-label="本站得分">${r.this_event_score||0}</td><td class="tn r" data-label="扣除积分">${r.deduct_score>0?'-'+r.deduct_score:'0'}</td><td class="tn y" data-label="即时积分">${r.instant_score||0}</td><td class="tc" data-label="排名变化">${ch}</td><td class="tn s" data-label="存活天数">${r.day||0}</td></tr>`;
    rowsHtml+=`<tr class="sdr-row" id="sdr-${g}-${esc(r.username)}"><td class="sdr-cell" colspan="10"><div class="day-list"></div></td></tr>`;
  }
  
  function mth(col,key,t,cls=''){return `<th${cls?' class="'+cls+'"':''} onclick="srt('${tab}',${col},'${key}')">${t}</th>`;}
  const hdrHtml=`<thead><tr>${mth(0,'cr','当前排名')}${mth(1,'ir','即时排名','sd')}${mth(2,'user','用户名')}${mth(3,'today','今日选择Day'+data.today_day)}${mth(4,'status','状态')}${mth(5,'this','本站得分')}${mth(6,'deduct','扣除积分')}${mth(7,'instant','即时积分')}${mth(8,'chg','排名变化')}${mth(9,'day','存活天数')}</tr></thead>`;
  
  cont.innerHTML=statsHtml+kpi+`<div class="toolbar"><input id="q-${tab}" placeholder="🔍 搜索..." oninput="doFilter('${tab}')"><button class="fbtn on" onclick="setF('${tab}','all',this)">全部</button><button class="fbtn" onclick="setF('${tab}','alive',this)">仅存活</button><button class="fbtn" onclick="setF('${tab}','filled',this)">今日已填</button></div><div class="tbl-wrap"><table id="${tbl_id}">${hdrHtml}<tbody id="${tb_id}">${rowsHtml}</tbody></table></div>`;
  cont.style.display='block';
  
  // 按即时排名排序
  const tb=document.getElementById(tb_id);
  if(tb){
    const allTr=Array.from(tb.rows);const pairs=[];
    for(let i=0;i<allTr.length;i++){
      const r=allTr[i];
      if(r.dataset.ir!==undefined||r.dataset.status!==undefined){
        const sdr=(allTr[i+1]&&allTr[i+1].classList.contains('sdr-row'))?allTr[i+1]:null;
        pairs.push({main:r,sdr});if(sdr)i++;
      }
    }
    pairs.sort((a,b)=>parseInt(a.main.dataset.ir||9999)-parseInt(b.main.dataset.ir||9999));
    pairs.forEach(p=>{tb.appendChild(p.main);if(p.sdr)tb.appendChild(p.sdr);});
  }
}

function getStatusClass(fs,status){
  if(fs==='存活'||status===2) return 'alive';
  if(fs==='球员输球') return 'player-loss';
  if(fs==='球员退赛') return 'player-wd';
  if(fs&&fs.includes('自杀')) return 'suicide';
  return 'dead';
}
function getBadge(fs,status,sc){
  const m={alive:'<span class="badge ba">🟢 存活</span>',suicide:`<span class="badge bs">⊘ ${fs}</span>`,'player-loss':`<span class="badge bl">❌ ${fs}</span>`,'player-wd':`<span class="badge bw">⚪ ${fs}</span>`};
  if(fs==='未参赛')return '<span class="badge bs">— 未参赛</span>';return m[sc]||`<span class="badge bl">❌ ${fs||''}</span>`;
}

// ===== 渲染偏好 =====
function normalizePrefData(g, pdata){
  // 兼容两种 preference.json 格式：
  // 1) 新格式：{ms:{uid:{...}}, ms_order:[[uid,ir],...]}
  // 2) 老格式：{ms:[{user_id, username, ...}], ws:[...]}
  const raw = pdata[g] || (g==='ms' ? pdata.ms : pdata.ws) || {};
  let dict = {};
  let order = [];

  if (Array.isArray(raw)) {
    // 老格式数组 -> 转成前端需要的字典格式
    for (const item of raw) {
      const uid = String(item.user_id || '');
      if (!uid) continue;
      dict[uid] = {
        u: item.username || '',
        ep: item.events_participated || 0,
        ee: item.events_eliminated || 0,
        ec: item.events_champion || 0,
        wn: item.worst_player_name || '',
        wc: item.worst_player_count || 0,
        bn: item.best_player_name || '',
        bc: item.best_player_count || 0,
        cp: item.champion_players || '—',
        fp: item.final_players || '—',
        ir: item.instant_rank || null,
        d: item.d || {
          p: item.detail_participated || item.dp || [],
          e: item.detail_eliminated || item.de || [],
          c: item.detail_championed || item.dc || [],
          el: item.detail_elim || item.del || {},
          ad: item.detail_adv || item.dad || {},
          ch: item.detail_champ || item.dch || {},
          fi: item.detail_final || item.dfi || {}
        }
      };
      order.push([uid, dict[uid].ir]);
    }
    // 关键：把转换后的 dict 写回 PDATA，供 toggleExpDyn 展开明细使用
    if (pdata) pdata[g] = dict;
  } else {
    // 新格式字典
    dict = raw;
    order = pdata[g + '_order'] || Object.keys(dict).map(uid => [uid, dict[uid].ir || null]);
  }

  // 默认按即时排名升序；无即时排名排最后
  order.sort((a,b)=>{
    const ia = a[1] || (dict[a[0]] && dict[a[0]].ir) || 9999;
    const ib = b[1] || (dict[b[0]] && dict[b[0]].ir) || 9999;
    return ia - ib;
  });

  return {dict, order};
}

function toggleExpDyn(row){
  const g=row.dataset.ds==='MSD'?'ms':'ws';
  const uid=row.dataset.uid;
  let er=row.nextElementSibling;
  if(!er||!er.classList.contains('exp-row')){
    er=document.createElement('tr');er.className='exp-row';
    er.innerHTML='<td colspan="9"></td>';
    row.parentNode.insertBefore(er,row.nextSibling);
  }
  if(er.classList.contains('open')){er.classList.remove('open');return;}
  const p=PDATA&&PDATA[g]&&PDATA[g][uid];
  if(!p||!p.d){er.querySelector('td').innerHTML='<div class="exp-inner">暂无详细数据</div>';er.classList.add('open');return;}
  const d=p.d;
  function mkTags(arr,cls=''){return (arr||[]).map(n=>`<span class="exp-tag ${cls}">${n}</span>`).join('');}
  function mkSubs(obj,cls=''){return Object.entries(obj||{}).sort((a,b)=>b[1].length-a[1].length).map(([pl,evs])=>`<div class="exp-sub"><div class="exp-sub-t">${pl}（${evs.length}次）</div><div>${evs.map(e=>`<span class="exp-tag ${cls}">${e}</span>`).join('')}</div></div>`).join('');}
  let secs=[];
  if(d.p && d.p.length) secs.push(`<div class="exp-sec"><h5>参加了哪些站</h5><div class="exp-tags">${mkTags(d.p)}</div></div>`);
  if(d.e && d.e.length) secs.push(`<div class="exp-sec"><h5>哪些站淘汰</h5><div class="exp-tags">${mkTags(d.e,'r')}</div></div>`);
  if(d.c && d.c.length) secs.push(`<div class="exp-sec"><h5>哪些站夺冠🏆</h5><div class="exp-tags">${mkTags(d.c,'g')}</div></div>`);
  if(d.el && Object.keys(d.el).length) secs.push(`<div class="exp-sec"><h5>克星球员⚔️</h5>${mkSubs(d.el,'r')}</div>`);
  if(d.ad && Object.keys(d.ad).length) secs.push(`<div class="exp-sec"><h5>福星球员🍀(Top5)</h5>${mkSubs(d.ad,'g')}</div>`);
  if(d.ch && Object.keys(d.ch).length) secs.push(`<div class="exp-sec"><h5>夺冠球员🏆</h5>${mkSubs(d.ch,'g')}</div>`);
  if(d.fi && Object.keys(d.fi).length) secs.push(`<div class="exp-sec"><h5>夺亚球员🎯</h5>${mkSubs(d.fi)}</div>`);
  er.querySelector('td').innerHTML=`<div class="exp-inner"><div class="exp-grid">${secs.join('')}</div></div>`;
  er.classList.add('open');
}

function toggleSdr(tr){
  // 直接找下面紧邻的 sdr-row（排序已保证配对）
  var sdr=tr.nextElementSibling;
  if(!sdr||!sdr.classList.contains('sdr-row')){
    var g=(tr.closest('tbody')?.id||'').replace('tb-','').replace('-s','');
    sdr=document.getElementById('sdr-'+g+'-'+tr.dataset.user);
  }
  if(!sdr)return;
  if(sdr.classList.contains('open')){sdr.classList.remove('open');return;}
  var players=[];try{players=JSON.parse(decodeURIComponent(tr.dataset.pl||'[]'));}catch(e){}
  var isAlive=tr.dataset.status==='alive';
  var todayPlayer=tr.dataset.today||'';   // 今天已填但未结算
  var hasFilled=tr.dataset.filled==='1';  // 是否今天已填
  var html='<div class="day-list">';
  if(!players.length&&!hasFilled){
    html+='<span style="color:#9a7a40;font-size:12px">暂无选人记录（请等待数据更新）</span>';
  }else{
    // players = 已结算历史（Day1 ~ 最近一次结算），全部已出结果
    players.forEach(function(p,i){
      var icon,cls;
      if(isAlive){
        // 存活用户：历史所有天已结算且存活 → ✅（轮空也✅）
        icon='✅'; cls='day-alive';
      }else{
        // 出局用户：最后一天是出局天❌，之前全✅
        var isLastSettled=(i===players.length-1);
        icon=isLastSettled?'❌':'✅';
        cls=isLastSettled?'day-dead':'day-alive';
      }
      if(p==='轮空'){icon='✅';cls='day-alive';}
      html+='<span class="day-item '+cls+'"><span class="day-num">Day'+(i+1)+'</span>'+icon+' '+p+'</span>';
    });
    // 存活 + 今天已填 → 追加今天未结算的选择（🟢）
    if(isAlive&&hasFilled&&todayPlayer){
      var tIcon=todayPlayer==='轮空'?'✅':'🟢';
      var tNote=todayPlayer==='轮空'?'':' <span style="font-size:9px;color:#9a7a40">未结算</span>';
      html+='<span class="day-item day-alive day-today"><span class="day-num">Day'+(players.length+1)+'</span>'+tIcon+' '+todayPlayer+tNote+'</span>';
    }
  }
  html+='</div>';
  sdr.querySelector('.sdr-cell').innerHTML=html;
  sdr.classList.add('open');
}

function bdTypeBarHtml(u){
  var total=u.s||1;
  var vals={GS:u.gs||0,YE:u.ye||0,M1000:u.m1||0,A500:u.a5||0,A250:u.a2||0};
  var segs='';
  BD_TYPE_ORDER.forEach(function(t){var v=vals[t];if(v>0){var pct=(v/total*100).toFixed(1);segs+='<div class="bd-type-seg" style="background:'+BD_TYPE_COLORS[t]+';flex:0 0 '+pct+'%;max-width:'+pct+'%" title="'+BD_TYPE_LABELS[t]+':'+v+'"></div>';}});
  return '<div class="bd-type-bar">'+segs+'</div>';
}

function renderBreakdownPanel(g,data){
  var cont=document.getElementById('bd-content-'+g);
  var loading=document.getElementById('bd-loading-'+g);
  if(loading)loading.style.display='none';
  var labelCounts={},colorMap={};
  data.forEach(function(u){labelCounts[u.label]=(labelCounts[u.label]||0)+1;colorMap[u.label]=u.label_color;});
  var feat=[];
  BD_LABEL_GROUPS.forEach(function(group){
    for(var i=0;i<group.length;i++){var lb=group[i];if(labelCounts[lb]){feat.push([lb,labelCounts[lb],colorMap[lb]||'#9ca3af']);break;}}
  });
  var badgesHtml=feat.map(function(x){return '<div class="bd-sbadge"><span class="bd-badge" style="background:'+x[2]+'">'+x[0]+'</span> <b>'+x[1]+'</b>人</div>';}).join('');
  var rows='';
  data.forEach(function(u,i){
    rows+='<tr class="bd-main-row" data-bdi="'+i+'" data-bdg="'+g+'" data-ir="'+(u.ir||9999)+'" data-name="'+bdEsc(u.n)+'" data-score="'+(u.s||0)+'" data-gs="'+(u.gs||0)+'" data-m1="'+(u.m1||0)+'" data-a5="'+(u.a5||0)+'" data-a2="'+(u.a2||0)+'" data-ye="'+(u.ye||0)+'" data-label="'+bdEsc(u.label||'')+'" onclick="toggleBdExp(this)">'+
      '<td class="bd-ir">'+(u.ir||'—')+'</td>'+
      '<td class="bd-name" title="'+bdEsc(u.n)+'">'+u.n+'</td>'+
      '<td class="bd-score">'+(u.s||0).toLocaleString()+'</td>'+
      '<td>'+bdTypeBarHtml(u)+'</td>'+
      '<td class="bd-num" style="color:#f59e0b">'+(u.gs||'—')+'</td>'+
      '<td class="bd-num" style="color:#ef4444">'+(u.m1||'—')+'</td>'+
      '<td class="bd-num" style="color:#3b82f6">'+(u.a5||'—')+'</td>'+
      '<td class="bd-num" style="color:#22c55e">'+(u.a2||'—')+'</td>'+
      '<td class="bd-num" style="color:#8b5cf6">'+(u.ye||'—')+'</td>'+
      '<td><span class="bd-badge" style="background:'+u.label_color+'">'+u.label+'</span></td>'+
    '</tr>'+
    '<tr class="bd-exp-row" id="bdexp-'+g+'-'+i+'"><td class="bd-exp-cell" colspan="10"></td></tr>';
  });
  cont.innerHTML=
    '<div class="bd-stat-row"><div class="bd-sbadge">参与用户 <b>'+data.length+'</b></div>'+badgesHtml+'</div>'+
    '<div class="bd-toolbar"><input id="bdq-'+g+'" placeholder="🔍 搜索用户名..." oninput="bdSearch(\''+g+'\')"></div>'+
    '<div class="bd-tbl-wrap"><table class="bd-tbl"><thead><tr>'+
    '<th>排名</th><th>用户名</th><th style="text-align:right">即时积分</th>'+
    '<th>类型分布</th>'+
    '<th style="text-align:right;color:#f59e0b">大满贯</th>'+
    '<th style="text-align:right;color:#ef4444">1000赛</th>'+
    '<th style="text-align:right;color:#3b82f6">500赛</th>'+
    '<th style="text-align:right;color:#22c55e">250赛</th>'+
    '<th style="text-align:right;color:#8b5cf6">年终</th>'+
    '<th>积分评价</th></tr></thead>'+
    '<tbody id="bdtb-'+g+'">'+rows+'</tbody></table></div>';
  var bdKeys=['ir','name','score','score','gs','m1','a5','a2','ye','label'];
  cont.querySelectorAll('.bd-tbl th').forEach(function(th,i){th.onclick=function(){bdSort(g,i,bdKeys[i]||'ir');};});
  cont.style.display='block';
}

function toggleBdExp(row){
  var idx=parseInt(row.dataset.bdi),g=row.dataset.bdg;
  var er=document.getElementById('bdexp-'+g+'-'+idx);
  if(!er)return;
  if(er.classList.contains('open')){er.classList.remove('open');return;}
  if(!BD_DATA){return;}
  var u=BD_DATA[g][idx];
  if(!u){er.classList.add('open');return;}
  er.querySelector('.bd-exp-cell').innerHTML=buildBdExpHtml(u,'bd-'+g+'-'+idx);
  er.classList.add('open');
  setTimeout(function(){renderBdPies(u,'bd-'+g+'-'+idx);},60);
}

function buildBdExpHtml(u,id){
  var total=u.s||1;
  var typeEvs=u.type_evs||{};
  var typeHtml='';
  BD_TYPE_ORDER.forEach(function(t){
    var evs=typeEvs[t];if(!evs||!evs.length)return;
    var tTotal=evs.reduce(function(s,e){return s+e.s;},0);
    var evItems='';
    evs.forEach(function(ev){
      var sf=ev.surf?'<span class="bd-surf-tag bd-surf-'+ev.surf+'">'+(ev.surf==='hard_out'?'硬外':ev.surf==='hard_in'?'硬内':ev.surf==='clay'?'红土':'草地')+'</span>':'';
      var fc=ev.forced?'<span class="bd-forced">强制</span>':'';
      var exp=ev.expiry?'<span class="bd-ev-expiry">'+ev.expiry+'失效</span>':'';
      evItems+='<div class="bd-ev-item">'+fc+sf+'<span class="bd-ev-name">'+ev.n+'</span><span class="bd-ev-score">'+ev.s+'</span>'+exp+'</div>';
    });
    typeHtml+='<div class="bd-ev-group"><div class="bd-ev-group-hdr"><div class="bd-ev-dot" style="background:'+BD_TYPE_COLORS[t]+'"></div>'+BD_TYPE_LABELS[t]+' · '+tTotal+'分</div>'+evItems+'</div>';
  });
  var typeLegend='';
  var typeVals={GS:u.gs||0,YE:u.ye||0,M1000:u.m1||0,A500:u.a5||0,A250:u.a2||0};
  BD_TYPE_ORDER.forEach(function(t){var v=typeVals[t];if(!v)return;typeLegend+='<div class="bd-legend-item"><div class="bd-legend-dot" style="background:'+BD_TYPE_COLORS[t]+'"></div><span class="bd-legend-name">'+BD_TYPE_LABELS[t]+'</span><span class="bd-legend-val">'+v+'</span><span class="bd-legend-pct">('+(v/total*100).toFixed(1)+'%)</span></div>';});
  var ss=u.surf_scores||{};
  var surfOrder=['hard_out','hard_in','clay','grass'];
  var surfTotal=surfOrder.reduce(function(s,k){return s+(ss[k]||0);},0)||1;
  var maxSurf=Math.max.apply(null,surfOrder.map(function(k){return ss[k]||0;}));
  var surfLegend='',surfBars='';
  surfOrder.forEach(function(sk){
    var v=ss[sk]||0;if(!v)return;
    var pct=(v/surfTotal*100).toFixed(1);
    surfLegend+='<div class="bd-legend-item"><div class="bd-legend-dot" style="background:'+BD_SURF_COLORS[sk]+'"></div><span class="bd-legend-name">'+BD_SURF_LABELS[sk]+'</span><span class="bd-legend-val">'+v+'</span><span class="bd-legend-pct">('+pct+'%)</span></div>';
    var bp=maxSurf>0?(v/maxSurf*100).toFixed(1):0;
    surfBars+='<div class="bd-surf-row"><div class="bd-surf-lbl">'+BD_SURF_LABELS[sk]+'</div><div class="bd-surf-track"><div class="bd-surf-fill" style="width:'+bp+'%;background:'+BD_SURF_COLORS[sk]+'"></div></div><div class="bd-surf-val">'+v+'</div><div class="bd-surf-pct">'+pct+'%</div></div>';
  });
  var expList=u.exp_list||[];
  var maxExp=Math.max.apply(null,expList.map(function(e){return e.total;}).concat([1]));
  var barRows='';
  expList.forEach(function(ed,i){
    if(ed.total>0){
      var fp=Math.max((ed.total/maxExp*100),3).toFixed(1);
      var sib=parseFloat(fp)>22;
      var evArr=(ed.events||[]).slice().sort(function(a,b){var sa=parseInt((a.match(/\((\d+)\)/)||[])[1]||0),sb=parseInt((b.match(/\((\d+)\)/)||[])[1]||0);return sb-sa;});
      var evStr=evArr.join('\u3001');
      var ev5=evArr.slice(0,5).join('\u3001')+(evArr.length>5?' +'+(evArr.length-5)+'\u7ad9':'');
      barRows+='<div class="bd-bar-row"><div class="bd-bar-month">'+BD_MONTH_DISPLAY[i]+'</div><div class="bd-bar-track"><div class="bd-bar-fill" style="width:'+fp+'%">'+(sib?'<span class="bd-bar-fill-txt">'+ed.total+'</span>':'')+'</div></div>'+(sib?'<div class="bd-bar-score-out"></div>':'<div class="bd-bar-score-out">'+ed.total+'</div>')+'<div class="bd-bar-events" title="'+evStr+'">'+ev5+'</div></div>';
    }else{
      barRows+='<div class="bd-bar-row bd-bar-row-zero"><div class="bd-bar-month">'+BD_MONTH_DISPLAY[i]+'</div><span class="bd-bar-zero">\u65e0\u5931\u6548</span></div>';
    }
  });
  return '<div class="bd-exp-inner">'+
    '<div class="bd-exp-title">\uD83D\uDCCA '+u.n+
    ' <span style="color:#f97316;font-weight:800">'+(u.s||0).toLocaleString()+'\u5206</span>'+
    ' <span style="color:#7c3aed">\u5373\u65f6\u6392\u540d #'+(u.ir||'—')+'</span>'+
    ' <span class="bd-badge" style="background:'+u.label_color+'">'+u.label+'</span></div>'+
    '<div class="bd-exp-grid">'+
    '<div class="bd-card bd-card-type"><div class="bd-card-hdr" onclick="bdToggleCard(this)"><span class="bd-toggle">▼</span>\u8d5b\u4e8b\u7c7b\u578b\u79ef\u5206</div><div class="bd-cc">'+
    '<div class="bd-chart-area"><div class="bd-chart-wrap"><canvas id="bdpie-type-'+id+'" width="120" height="120"></canvas><div class="bd-chart-center"><div class="bd-chart-total">'+(u.s||0).toLocaleString()+'</div><div class="bd-chart-sub">\u603b\u79ef\u5206</div></div></div><div class="bd-chart-legend">'+typeLegend+'</div></div>'+
    '<div style="margin-top:8px">'+typeHtml+'</div></div></div>'+
    '<div class="bd-card bd-card-surf"><div class="bd-card-hdr" onclick="bdToggleCard(this)"><span class="bd-toggle">▼</span>\u573a\u5730\u7c7b\u578b\u5206\u5e03</div><div class="bd-cc">'+
    '<div class="bd-chart-area"><div class="bd-chart-wrap"><canvas id="bdpie-surf-'+id+'" width="120" height="120"></canvas><div class="bd-chart-center"><div class="bd-chart-total" style="font-size:12px">\u573a\u5730</div><div class="bd-chart-sub">\u7c7b\u578b</div></div></div><div class="bd-chart-legend">'+surfLegend+'</div></div>'+
    '<div style="margin-top:8px">'+surfBars+'</div></div></div>'+
    '<div class="bd-card bd-card-expiry"><div class="bd-card-hdr" onclick="bdToggleCard(this)"><span class="bd-toggle">▼</span>⏰ \u79ef\u5206\u5931\u6548\u65f6\u95f4\uff08\u672a\u676512\u4e2a\u6708\uff09</div><div class="bd-cc">'+barRows+'</div></div>'+
    '</div></div>';
}

function renderBdPies(u,id){
  var c,ck,labels,vals,colors;
  c=document.getElementById('bdpie-type-'+id);
  if(c&&typeof Chart!=='undefined'){
    ck='t-'+id;if(BD_CHARTS[ck])BD_CHARTS[ck].destroy();
    labels=[];vals=[];colors=[];
    var tv={GS:u.gs||0,YE:u.ye||0,M1000:u.m1||0,A500:u.a5||0,A250:u.a2||0};
    BD_TYPE_ORDER.forEach(function(t){if(tv[t]>0){labels.push(BD_TYPE_LABELS[t]);vals.push(tv[t]);colors.push(BD_TYPE_COLORS[t]);}});
    if(vals.length){BD_CHARTS[ck]=new Chart(c,{type:'doughnut',data:{labels:labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},options:{responsive:false,cutout:'62%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ctx.label+': '+ctx.raw+'\u5206 ('+(ctx.raw/(u.s||1)*100).toFixed(1)+'%)';}}}}}}); }
  }
  c=document.getElementById('bdpie-surf-'+id);
  if(c&&typeof Chart!=='undefined'){
    ck='s-'+id;if(BD_CHARTS[ck])BD_CHARTS[ck].destroy();
    labels=[];vals=[];colors=[];
    var ss=u.surf_scores||{};
    ['hard_out','hard_in','clay','grass'].forEach(function(sk){if(ss[sk]>0){labels.push(BD_SURF_LABELS[sk]);vals.push(ss[sk]);colors.push(BD_SURF_COLORS[sk]);}});
    if(vals.length){BD_CHARTS[ck]=new Chart(c,{type:'doughnut',data:{labels:labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},options:{responsive:false,cutout:'62%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ctx.label+': '+ctx.raw+'\u5206';}}}}}}); }
  }
}

function bdToggleCard(hdr){
  var cc=hdr.nextElementSibling;if(!cc)return;
  if(cc.style.display==='none'){cc.style.display='';hdr.classList.remove('collapsed');}
  else{cc.style.display='none';hdr.classList.add('collapsed');}
}

function bdSort(g,col,key){
  var k=g+'_'+key+'_'+col;
  BD_SORT[k]=(BD_SORT[k]||0)+1;
  var dir=BD_SORT[k]%3;
  var tb=document.getElementById('bdtb-'+g);
  if(!tb)return;
  var ths=document.querySelectorAll('#bd-content-'+g+' .bd-tbl th');
  ths.forEach(function(th){th.classList.remove('sa','sd');});
  var rows=Array.from(tb.rows), pairs=[];
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(r.classList.contains('bd-main-row')){
      var exp=null; if(rows[i+1]&&rows[i+1].classList.contains('bd-exp-row')) exp=rows[i+1];
      pairs.push({row:r,exp:exp});
      if(exp)i++;
    }
  }
  if(dir===0){key='ir'; if(ths[0])ths[0].classList.add('sd');}
  else if(ths[col])ths[col].classList.add(dir===1?'sa':'sd');
  var nums=['ir','score','gs','m1','a5','a2','ye'];
  var desc=(dir===1);
  pairs.sort(function(a,b){
    if(nums.indexOf(key)>=0){
      var av=parseFloat(a.row.dataset[key]||0),bv=parseFloat(b.row.dataset[key]||0);
      if(key==='ir')return desc?(bv-av):(av-bv);
      return desc?(bv-av):(av-bv);
    }
    var av=String(a.row.dataset[key]||'').toLowerCase(),bv=String(b.row.dataset[key]||'').toLowerCase();
    return desc?bv.localeCompare(av):av.localeCompare(bv);
  });
  pairs.forEach(function(p){tb.appendChild(p.row);if(p.exp)tb.appendChild(p.exp);});
  bdSearch(g);
}

function bdSearch(g){
  var q=(document.getElementById('bdq-'+g)||{value:''}).value.toLowerCase();
  document.querySelectorAll('#bdtb-'+g+' .bd-main-row').forEach(function(row){
    var name=row.querySelector('.bd-name')?row.querySelector('.bd-name').textContent.toLowerCase():'';
    var show=name.includes(q);
    row.style.display=show?'':'none';
    var er=document.getElementById('bdexp-'+row.dataset.bdg+'-'+row.dataset.bdi);
    if(er)er.style.display=show?'':'none';
  });
}

loadData();
