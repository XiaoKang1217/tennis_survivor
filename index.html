<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>签表幸存者之炉网</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans SC","Microsoft YaHei",sans-serif;background:linear-gradient(160deg,#fffbf0,#fff7e6,#fef3c7);min-height:100vh;color:#44321c;font-size:14px}
#hdr{background:linear-gradient(135deg,#f59e0b,#f97316,#ef4444);padding:13px 20px;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(245,158,11,.4)}
.hdt{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px}
#hdr h1{font-size:1.2em;font-weight:800;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.2)}
.upd{color:rgba(255,255,255,.8);font-size:11px}
.tabs{display:flex;gap:4px;margin-top:9px;flex-wrap:wrap}
.tab{padding:5px 12px;border:2px solid rgba(255,255,255,.4);border-radius:20px;cursor:pointer;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);font-size:12px;font-weight:700;transition:all .2s}
.tab.on{background:#fff;color:#f59e0b;border-color:#fff;box-shadow:0 3px 10px rgba(0,0,0,.15)}
.tab:hover:not(.on){background:rgba(255,255,255,.3)}
.main{padding:15px 20px}
.panel{display:none}.panel.on{display:block}
.kpi{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.kc{background:#fff;border:1px solid #fde68a;border-radius:10px;padding:9px 13px;min-width:88px;text-align:center;box-shadow:0 2px 8px rgba(245,158,11,.1)}
.kn{font-size:1.5em;font-weight:800;line-height:1.1}.kl{font-size:11px;color:#9a7a40;margin-top:3px}
.nt{color:#f59e0b}.na{color:#16a34a}.nd{color:#dc2626}
.toolbar{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.toolbar input{padding:6px 12px;border-radius:20px;border:2px solid #fde68a;background:#fffbf0;color:#44321c;font-size:13px;width:160px}
.toolbar input:focus{outline:none;border-color:#f59e0b}
.fbtn{padding:5px 12px;border-radius:20px;border:2px solid #fde68a;background:#fff;color:#9a7a40;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.fbtn.on{border-color:#f59e0b;background:#f59e0b;color:#fff}
.fbtn:hover:not(.on){border-color:#f97316;color:#f97316}
.tbl-wrap{overflow:auto;border-radius:10px;border:1px solid #fde68a;box-shadow:0 2px 12px rgba(245,158,11,.1);max-height:calc(100vh - 260px)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,#fef3c7,#fde68a)}
th{padding:10px 11px;text-align:left;color:#78450a;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:2px solid #fcd34d;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:rgba(245,158,11,.2)}
th.sa::after{content:" ⬇";color:#f59e0b}
th.sd::after{content:" ⬆";color:#f59e0b}
td{padding:8px 11px;border-bottom:1px solid #fef9f0;vertical-align:middle}
.ra{background:rgba(22,163,74,.04)}.rd{background:#fff}
tr.pref-row:hover td{background:rgba(245,158,11,.12)!important;cursor:pointer}
tr[data-status]:hover td{background:rgba(245,158,11,.07)!important}
.tn{text-align:center;font-weight:600}.tc{text-align:center}
.tu{font-weight:600;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#78450a}
.tt .pn{color:#d97706;font-weight:700}.tt .pa{display:block;color:#9ca3af;font-size:11px;margin-top:1px}
.nf{font-style:italic;color:#d1b896;font-size:11px}
.ir{color:#7c3aed!important}.y{color:#d97706!important;font-weight:700!important}
.r{color:#dc2626!important}.g{color:#16a34a!important}.s{color:#6b7280!important;font-weight:400!important}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap}
.ba{background:#dcfce7;color:#15803d;border:1px solid #86efac}
.bl{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5}
.bw{background:#fef9c3;color:#a16207;border:1px solid #fde047}
.bs{background:#f3f4f6;color:#6b7280;border:1px solid #d1d5db}
.cu{color:#16a34a;font-weight:800}.cd{color:#dc2626;font-weight:800}
.cn{color:#9ca3af}.cz{color:#6b7280}
.sc{background:#fff;border:1px solid #fde68a;border-radius:10px;padding:12px;margin-bottom:14px;box-shadow:0 2px 10px rgba(245,158,11,.1)}
.sch{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px;font-weight:700;color:#78450a;font-size:13px}
.scs{color:#9a7a40;font-size:12px;font-weight:500}
.st{width:100%;border-collapse:collapse;font-size:13px}
.st th{color:#9a7a40;font-size:11px;text-transform:uppercase;padding:5px 10px;border-bottom:1px solid #fde68a;text-align:left}
.st td{padding:6px 10px;border-bottom:1px solid #fef9f0}
.psr{color:#9a7a40;font-size:12px;font-weight:700;text-align:center;width:32px}
.psp{font-weight:700;color:#44321c}.psc{text-align:center;font-weight:700;color:#d97706}
.psp2{text-align:center;color:#9a7a40;font-size:12px}
.psb{padding-right:8px;min-width:80px}
.bbar{height:9px;border-radius:4px;min-width:2px}
.divider{border:none;border-top:2px dashed #fde68a;margin:14px 0}
.tp{max-width:200px;font-size:12px;color:#78450a;line-height:1.5}
.tw{font-weight:700;color:#44321c;max-width:150px}
/* 展开行 */
.exp-row{display:none;background:#fffbf0!important}
.exp-row.open{display:table-row}
.exp-inner{padding:12px 14px;border-top:2px dashed #fde68a}
.exp-grid{display:flex;flex-wrap:wrap;gap:10px}
.exp-sec{background:#fff;border:1px solid #fde68a;border-radius:8px;padding:9px 13px;min-width:160px;flex:1}
.exp-sec h5{font-size:11px;color:#9a7a40;text-transform:uppercase;font-weight:700;margin-bottom:6px;border-bottom:1px solid #fde68a;padding-bottom:4px}
.exp-tags{display:flex;flex-wrap:wrap;gap:4px}
.et{background:#fef3c7;border:1px solid #fcd34d;border-radius:12px;padding:2px 8px;font-size:12px;color:#78450a;white-space:nowrap}
.et.r{background:#fee2e2;border-color:#fca5a5;color:#dc2626}
.et.g{background:#dcfce7;border-color:#86efac;color:#15803d}
.exp-sub{margin-bottom:7px}
.exp-sub-t{font-size:12px;font-weight:700;color:#44321c;margin-bottom:4px}
/* 运势 */
.fortune-wrap{max-width:580px;margin:0 auto;text-align:center;padding:16px 0}
.fortune-title{font-size:1.5em;font-weight:800;color:#78450a;margin-bottom:5px}
.fortune-sub{color:#9a7a40;font-size:12px;margin-bottom:20px}
.fortune-tabs{display:flex;justify-content:center;gap:10px;margin-bottom:20px}
.ftab{padding:7px 22px;border:2px solid #fde68a;border-radius:20px;cursor:pointer;background:#fff;color:#9a7a40;font-weight:700;font-size:13px;transition:all .2s}
.ftab.on{background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;border-color:transparent;box-shadow:0 4px 15px rgba(245,158,11,.4)}
.fortune-card{background:#fff;border:2px solid #fde68a;border-radius:16px;padding:28px;box-shadow:0 8px 30px rgba(245,158,11,.15);min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:all .3s}
.fortune-card.shake{animation:sk .5s ease}
@keyframes sk{0%,100%{transform:rotate(0)}20%,60%{transform:rotate(-3deg)}40%,80%{transform:rotate(3deg)}}
.fortune-player{font-size:2em;font-weight:900;color:#f59e0b;letter-spacing:2px}
.fortune-text{font-size:13px;color:#78450a;line-height:1.8;max-width:380px;padding:10px 14px;background:#fef9f0;border-radius:10px;border-left:4px solid #f59e0b}
.fortune-btn{padding:11px 32px;background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 15px rgba(245,158,11,.4);transition:all .2s;margin-top:4px}
.fortune-btn:hover{transform:translateY(-2px)}.fortune-btn:active{transform:translateY(0)}
.fortune-hint{color:#9a7a40;font-size:11px}
.exp-tag{background:#fef3c7;border:1px solid #fcd34d;border-radius:12px;padding:2px 8px;font-size:12px;color:#78450a;white-space:nowrap;display:inline-block;margin:2px}
.exp-tag.r{background:#fee2e2;border-color:#fca5a5;color:#dc2626}
.exp-tag.g{background:#dcfce7;border-color:#86efac;color:#15803d}

.refresh-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:rgba(255,255,255,.8);margin-top:4px}
.refresh-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.loading{text-align:center;padding:40px;color:#9a7a40;font-size:16px}
.dev{color:rgba(255,255,255,.86);font-size:11px;margin-left:10px}.upd-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.select-mini{padding:5px 12px;border-radius:20px;border:2px solid #fde68a;background:#fff;color:#9a7a40;font-size:12px;font-weight:700}.yearbar,.flight-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}.flight-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}.flight-card{background:#fff;border:1px solid #fde68a;border-radius:12px;padding:12px;box-shadow:0 2px 10px rgba(245,158,11,.1)}.flight-day{font-size:18px;font-weight:900;color:#d97706}.flight-pill{background:#fef3c7;border:1px solid #fcd34d;border-radius:12px;padding:2px 8px;font-size:12px;color:#78450a;font-weight:700;display:inline-block;margin:2px}.flight-pill.r{background:#fee2e2;border-color:#fca5a5;color:#dc2626}.fattr{font-size:13px;font-weight:900;color:#d97706;background:#fef3c7;border:1px solid #fcd34d;border-radius:14px;padding:3px 12px}.fortune-yi{font-size:12px;color:#9a7a40;line-height:1.8}.fortune-text{max-width:460px}.dev-note{font-size:11px;color:#9a7a40}

@media(max-width:768px){
  body{font-size:13px}
  #hdr{padding:10px 12px}
  #hdr h1{font-size:1.05em}
  .hdt{align-items:flex-start}
  .tabs{gap:5px;overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}
  .tab{white-space:nowrap;padding:6px 10px;font-size:12px}
  .main{padding:10px}
  .kpi{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
  .kc{min-width:0;padding:8px}
  .kn{font-size:1.35em}
  .toolbar{position:sticky;top:88px;background:#fff7e6cc;z-index:20;padding:6px;border-radius:10px;backdrop-filter:blur(6px)}
  .toolbar input{width:130px;flex:1}
  .tbl-wrap{max-height:none;border-radius:8px}
  table{font-size:12px;min-width:820px}
  th,td{padding:7px 8px}
  .tu{max-width:120px}
  .fortune-wrap{padding:8px 0}
  .fortune-card{padding:18px;min-height:210px}
  .fortune-player{font-size:1.55em}
  .fortune-text{font-size:12px}
  .flight-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="hdr">
  <div class="hdt">
    <h1>🎾 签表幸存者之炉网</h1>
    <div class="upd-wrap"><span class="upd" id="upd-time">加载中...</span><span class="dev">开发者：Candice·卢布列娃</span></div>
  </div>
  <div class="refresh-bar">
    <div class="refresh-dot" id="rdot"></div>
    <span id="refresh-info">选人数据每30分钟自动更新；其他模块每天11:00更新</span>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="switchTab('ms-s',this)" id="tab-ms-s">🎾 ATP 男单</button>
    <button class="tab" onclick="switchTab('ws-s',this)" id="tab-ws-s">🎾 WTA 女单</button>
    <button class="tab" onclick="switchTab('ms-p',this)">📊 ATP 用户偏好</button>
    <button class="tab" onclick="switchTab('ws-p',this)">📊 WTA 用户偏好</button>
    <button class="tab" onclick="switchTab('ms-t',this)">💀 历史上的惨案-ATP</button>
    <button class="tab" onclick="switchTab('ws-t',this)">💔 历史上的惨案-WTA</button>
    <button class="tab" onclick="switchTab('flight',this)">✈️ 每日航班</button>
    <button class="tab" onclick="switchTab('fortune',this)">🔮 每日运势</button>
  </div>
</div>
<div class="main">

<div id="p-ms-s" class="panel on">
  <div class="loading" id="loading-ms">⏳ 加载ATP数据中...</div>
  <div id="content-ms-s" style="display:none"></div>
</div>
<div id="p-ws-s" class="panel">
  <div class="loading" id="loading-ws">⏳ 加载WTA数据中...</div>
  <div id="content-ws-s" style="display:none"></div>
</div>
<div id="p-ms-p" class="panel">
  <div class="loading" id="loading-msp">⏳ 加载ATP偏好数据中...</div>
  <div id="content-ms-p" style="display:none"></div>
</div>
<div id="p-ws-p" class="panel">
  <div class="loading" id="loading-wsp">⏳ 加载WTA偏好数据中...</div>
  <div id="content-ws-p" style="display:none"></div>
</div>
<div id="p-ms-t" class="panel"><div id="content-ms-t"></div></div>
<div id="p-ws-t" class="panel"><div id="content-ws-t"></div></div>
<div id="p-flight" class="panel"><div class="flight-toolbar"><div style="font-size:15px;font-weight:800;color:#d97706">✈️ 每日航班</div><select class="select-mini" id="flight-year" onchange="initFlightSelect()"><option selected>2026</option><option>2025</option><option>2024</option></select><select class="select-mini" id="flight-select" onchange="renderFlights()"></select></div><div id="flight-box" class="flight-grid"></div></div>
<div id="p-fortune" class="panel"><div class="fortune-wrap"><div class="fortune-title">🔮 今日运势抽签</div><div class="fortune-sub">每天选球员愁破头？让神明帮你做选择！</div><div class="fortune-tabs"><button class="ftab on" onclick="setFortune('atp',this)">⚡ ATP 男单</button><button class="ftab" onclick="setFortune('wta',this)">🌸 WTA 女单</button></div><div class="fortune-card" id="fortune-card"><div class="fortune-hint">✨ 今日可选球员已入签筒 ✨</div><div class="fortune-player" id="fortune-player">？？？</div><div class="fattr" id="fortune-attr">未摇签</div><div class="fortune-text" id="fortune-text">点击下方按钮，开始今日运势抽签</div><div class="fortune-yi" id="fortune-yi"></div></div><br><button class="fortune-btn" onclick="drawFortune()">🎋 摇签</button><br><br><div class="fortune-hint">签文仅供娱乐，后果自负 😄</div></div></div></div>>

<script>
let HIST_DATA=null;
const PREVIEW_MODE=false;
const FTEXTS=["此签大吉！天罡星照命，今日所选之人，剑气冲天，胜势已定，必能全身而退。", "上上签。月将入命，此球员今日如龙腾浅水，旺你旺到底，闭眼选，稳了。", "神托：紫微入局，福缘深厚，跟此人必有斩获，今日运势爆棚，大胆选之。", "贵人相助签。鹤立鸡群，此球员今日状态如满月之辉，旺场绝了，跟上不送。", "平安签。无大吉亦无大凶，今日平稳为上，此球员带你安渡难关，别太贪心。", "静待时机签。月相未圆，但此球员蓄势待发，有缘无缘看你运气，备选别忘了填。", "此乃心诚则灵签。你诚心选之，上天可能回应，但也可能不，反正备好备选。", "中签。今日运势平稳，此球员有一战之力，但敌人也不弱，认真填好备选。", "大凶签！！太岁相冲，凶星入命，今日选此球员十有八九凉凉，请务必填好备选！", "此签主破财损运，今日选此球员极易凉场，若不信，则自求多福，备选必须填！", "赔钱签！星盘显示今日此球员水逆严重，历史上凡选此人今日的，无一生还。请谨慎。", "阴煞缠身签。今日此球员与鬼门关有约，你若跟随，怕是要同去，建议另选。", "噩签。此球员今日如掉入深渊，选TA即相当于主动寄出出局通知。后悔药没有卖的。", "签曰：你选了这个人，跟本签一点关系都没有，全凭你的命。反正签就是个乐子。", "提前告知：此球员今日输了你别骂我，我只是个随机签，我也不想的。", "今日天意：此球员赢了，你运气好；输了，签文说了但你不信，总之我无责任。", "星座配对：你今天做任何选择都是错的。但还是得选，这就是幸存者的宿命。", "本日运势：已无可救药。此球员即将带你体验什么叫做「我以为我稳了」。", "意外之喜签（也可能是意外之悲）：50%赢50%输，全看命，填好备选才是王道。", "大凶且附赠嘲讽：你明知凶签还摇，这份精神感天动地，但成绩嘛…不保证。"];
let GDATA=null; let PDATA=null;
let MSPOOL=[]; let WSPOOL=[];
let fGender='atp';
const SS={};const FS={};

// ===== 数据加载 =====
async function loadData(){
  const t=Date.now();
  // 先加载必要的实时数据（current.json）
  try{
    const cur=await fetch('data/current.json?t='+t).then(r=>r.json());
    GDATA=cur;
    MSPOOL=(cur.ms&&cur.ms.today_pool)||[];
    WSPOOL=(cur.ws&&cur.ws.today_pool)||[];
    document.getElementById('upd-time').textContent='⏱ '+(cur.updated_at||'')+'｜每30分钟更新';
    if(cur.ms){document.getElementById('tab-ms-s').textContent='🎾 ATP '+(cur.ms.event_name||'')+(cur.ms.today_day?' Day'+cur.ms.today_day:'');renderScore('ms', cur.ms);}
    if(cur.ws){document.getElementById('tab-ws-s').textContent='🎾 WTA '+(cur.ws.event_name||'')+(cur.ws.today_day?' Day'+cur.ws.today_day:'');renderScore('ws', cur.ws);}
  }catch(e){
    console.error('实时数据加载失败',e);
    document.getElementById('upd-time').textContent='⚠️ 实时数据加载失败，请刷新';
    document.getElementById('loading-ms').textContent='⚠️ 数据加载失败，请刷新页面';
    document.getElementById('loading-ws').textContent='⚠️ 数据加载失败，请刷新页面';
  }
  // 偏好数据单独加载（失败不影响主页面）
  try{
    HIST_DATA=await fetch('data/history.json?t='+t).then(r=>r.json());
    const pref={updated_at:HIST_DATA.updated_at||'', ms:HIST_DATA.preference_by_year['2026'].ms, ws:HIST_DATA.preference_by_year['2026'].ws};
    PDATA=pref;
    renderPref('ms', pref);
    renderPref('ws', pref);
    renderDisaster('ms');
    renderDisaster('ws');
    initFlightSelect();
  }catch(e){
    console.warn('偏好数据加载失败（非致命）',e);
    document.getElementById('loading-msp').textContent='⚠️ 偏好数据暂时不可用';
    document.getElementById('loading-wsp').textContent='⚠️ 偏好数据暂时不可用';
  }
}

async function refreshCurrentOnly(){
  try{
    const cur=await fetch('data/current.json?t='+Date.now()).then(r=>r.json());
    GDATA=cur;
    MSPOOL=cur.ms.today_pool||[];
    WSPOOL=cur.ws.today_pool||[];
    document.getElementById('upd-time').textContent='⏱ '+cur.updated_at+'｜每30分钟更新';
    document.getElementById('tab-ms-s').textContent='🎾 ATP '+cur.ms.event_name+' Day'+cur.ms.today_day;
    document.getElementById('tab-ws-s').textContent='🎾 WTA '+cur.ws.event_name+' Day'+cur.ws.today_day;
    renderScore('ms', cur.ms);
    renderScore('ws', cur.ws);
    document.getElementById('rdot').style.background='#4ade80';
    setTimeout(()=>document.getElementById('rdot').style.background='#4ade80',2000);
  }catch(e){document.getElementById('rdot').style.background='#f87171';}
}

setInterval(refreshCurrentOnly, 30*60*1000);

// ===== 渲染实时得分 =====
function renderScore(g, data){
  const cont=document.getElementById('content-'+g+'-s');
  const loading=document.getElementById('loading-'+(g=='ms'?'ms':'ws'));
  if(loading) loading.style.display='none';
  const rows=data.rows||[];
  const totalUsers=rows.length;
  const siteRows=rows.filter(r=>r.fill_status!=='未参赛' && !r.not_participated);
  const siteTotal=siteRows.length;
  const alive=siteRows.filter(r=>r.fill_status==='存活'||r.status===2).length;
  const filled=data.filled_count||siteRows.filter(r=>r.has_today&&r.today_player&&r.today_player!=='轮空').length;
  const suicide=siteRows.filter(r=>String(r.fill_status||'').includes('自杀')).length;
  const total=siteTotal;
  const stats=data.player_stats||[];
  
  // 今日选人统计
  const ccArr=['#f59e0b','#f97316','#ef4444','#8b5cf6','#10b981','#3b82f6'];
  const statsHtml=stats.length?`<div class="sc"><div class="sch"><span>📊 今日选人统计—${g=='ms'?'ATP男单':'WTA女单'}Day${data.today_day}</span><span class="scs">填写${filled}人·存活${alive}人</span></div><table class="st"><thead><tr><th></th><th>选手</th><th>人数</th><th>占比</th><th>分布</th></tr></thead><tbody>${stats.map((it,i)=>`<tr><td class="psr">#${i+1}</td><td class="psp">${it[0]}</td><td class="psc">${it[1]}人</td><td class="psp2">${(it[1]/filled*100).toFixed(1)}%</td><td class="psb"><div class="bbar" style="width:${(it[1]/filled*100).toFixed(1)}%;background:${ccArr[i%6]}"></div></td></tr>`).join('')}</tbody></table></div><hr class="divider">`:'' ;
  
  // KPI
  const kpi=`<div class="kpi"><div class="kc"><div class="kn nt">${totalUsers}</div><div class="kl">总人数</div></div><div class="kc"><div class="kn nt">${siteTotal}</div><div class="kl">本站参赛</div></div><div class="kc"><div class="kn na">${alive}</div><div class="kl">🟢存活</div></div><div class="kc"><div class="kn nd">${siteTotal-alive}</div><div class="kl">❌出局</div></div><div class="kc"><div class="kn" style="color:#7c3aed">${filled}</div><div class="kl">今日已填</div></div><div class="kc"><div class="kn nd">${suicide}</div><div class="kl">自杀</div></div></div>`;
  
  // 表格行
  const tb_id='tb-'+g+'-s';
  const tbl_id='tbl-'+g+'-s';
  const tab=g+'-s';
  let rowsHtml='';
  for(const r of rows){
    const sc=getStatusClass(r.fill_status,r.status);
    const badge=getBadge(r.fill_status,r.status,sc);
    const td = r.has_today
      ? ((r.today_player && r.today_player !== '轮空')
          ? `<span class="pn">${r.today_player}</span>` + (r.today_player_alt ? `<span class="pa">备：${r.today_player_alt}</span>` : '')
          : '<span class="nf">未填写</span>')
      : '<span class="nf">未填写</span>';
    const chg=r.rank_change;
    const ch=chg===null?'<span class="cn">—</span>':chg>0?`<span class="cu">▲${chg}</span>`:chg<0?`<span class="cd">▼${Math.abs(chg)}</span>`:'<span class="cz">→0</span>';
    const cr=r.current_rank||9999; const ir=r.instant_rank||9999;
    rowsHtml+=`<tr class="${sc==='alive'?'ra':'rd'}" data-status="${sc}" data-filled="${r.has_today?'1':'0'}" data-cr="${cr}" data-ir="${ir}" data-cur="${r.current_score||0}" data-deduct="${r.deduct_score||0}" data-this="${r.this_event_score||0}" data-instant="${r.instant_score||0}" data-day="${r.day||0}" data-chg="${r.rank_change||0}" data-user="${esc(r.username)}" data-today="${esc(r.today_player||'')}" data-alive="${sc==='alive'?1:0}"><td class="tn">${cr==9999?'—':cr}</td><td class="tn ir">${ir==9999?'—':ir}</td><td class="tu">${r.username}</td><td class="tt">${td}</td><td>${badge}</td><td class="tn g">${r.this_event_score||0}</td><td class="tn r">${r.deduct_score>0?'-'+r.deduct_score:'0'}</td><td class="tn y">${r.instant_score||0}</td><td class="tc">${ch}</td><td class="tn s">${r.day||0}</td></tr>`;
  }
  
  function mth(col,key,t,cls=''){return `<th${cls?' class="'+cls+'"':''} onclick="srt('${tab}',${col},'${key}')">${t}</th>`;}
  const hdrHtml=`<thead><tr>${mth(0,'cr','当前排名')}${mth(1,'ir','即时排名','sd')}${mth(2,'user','用户名')}${mth(3,'today','今日选择Day'+data.today_day)}${mth(4,'status','状态')}${mth(5,'this','本站得分')}${mth(6,'deduct','扣除积分')}${mth(7,'instant','即时积分')}${mth(8,'chg','排名变化')}${mth(9,'day','存活天数')}</tr></thead>`;
  
  cont.innerHTML=statsHtml+kpi+`<div class="toolbar"><input id="q-${tab}" placeholder="🔍 搜索..." oninput="doFilter('${tab}')"><button class="fbtn on" onclick="setF('${tab}','all',this)">全部</button><button class="fbtn" onclick="setF('${tab}','alive',this)">仅存活</button><button class="fbtn" onclick="setF('${tab}','filled',this)">今日已填</button></div><div class="tbl-wrap"><table id="${tbl_id}">${hdrHtml}<tbody id="${tb_id}">${rowsHtml}</tbody></table></div>`;
  cont.style.display='block';
  
  // 按即时排名排序
  const tb=document.getElementById(tb_id);
  if(tb) Array.from(tb.querySelectorAll('tr')).sort((a,b)=>parseInt(a.dataset.ir||9999)-parseInt(b.dataset.ir||9999)).forEach(r=>tb.appendChild(r));
}

function getStatusClass(fs,status){
  if(fs==='存活'||status===2) return 'alive';
  if(fs==='球员输球') return 'player-loss';
  if(fs==='球员退赛') return 'player-wd';
  if(fs&&fs.includes('自杀')) return 'suicide';
  return 'dead';
}
function getBadge(fs,status,sc){
  const m={alive:'<span class="badge ba">🟢 存活</span>',suicide:`<span class="badge bs">⊘ ${fs}</span>`,'player-loss':`<span class="badge bl">❌ ${fs}</span>`,'player-wd':`<span class="badge bw">⚪ ${fs}</span>`};
  if(fs==='未参赛')return '<span class="badge bs">— 未参赛</span>';return m[sc]||`<span class="badge bl">❌ ${fs||''}</span>`;
}

// ===== 渲染偏好 =====
function normalizePrefData(g, pdata){
  // 兼容两种 preference.json 格式：
  // 1) 新格式：{ms:{uid:{...}}, ms_order:[[uid,ir],...]}
  // 2) 老格式：{ms:[{user_id, username, ...}], ws:[...]}
  const raw = pdata[g] || (g==='ms' ? pdata.ms : pdata.ws) || {};
  let dict = {};
  let order = [];

  if (Array.isArray(raw)) {
    // 老格式数组 -> 转成前端需要的字典格式
    for (const item of raw) {
      const uid = String(item.user_id || '');
      if (!uid) continue;
      dict[uid] = {
        u: item.username || '',
        ep: item.events_participated || 0,
        ee: item.events_eliminated || 0,
        ec: item.events_champion || 0,
        wn: item.worst_player_name || '',
        wc: item.worst_player_count || 0,
        bn: item.best_player_name || '',
        bc: item.best_player_count || 0,
        cp: item.champion_players || '—',
        fp: item.final_players || '—',
        ir: item.instant_rank || null,
        d: item.d || {
          p: item.detail_participated || item.dp || [],
          e: item.detail_eliminated || item.de || [],
          c: item.detail_championed || item.dc || [],
          el: item.detail_elim || item.del || {},
          ad: item.detail_adv || item.dad || {},
          ch: item.detail_champ || item.dch || {},
          fi: item.detail_final || item.dfi || {}
        }
      };
      order.push([uid, dict[uid].ir]);
    }
    // 关键：把转换后的 dict 写回 PDATA，供 toggleExpDyn 展开明细使用
    if (pdata) pdata[g] = dict;
  } else {
    // 新格式字典
    dict = raw;
    order = pdata[g + '_order'] || Object.keys(dict).map(uid => [uid, dict[uid].ir || null]);
  }

  // 默认按即时排名升序；无即时排名排最后
  order.sort((a,b)=>{
    const ia = a[1] || (dict[a[0]] && dict[a[0]].ir) || 9999;
    const ib = b[1] || (dict[b[0]] && dict[b[0]].ir) || 9999;
    return ia - ib;
  });

  return {dict, order};
}

function renderPref(g, pdata){
  const cont=document.getElementById('content-'+g+'-p');
  const loading=document.getElementById(g==='ms' ? 'loading-msp' : 'loading-wsp');
  if(loading) loading.style.display='none';

  const normalized = normalizePrefData(g, pdata);
  const order = normalized.order;
  const dict = normalized.dict;
  const tab=g+'-p';
  
  let rowsHtml='';
  for(const [uid,ir] of order){
    const p=dict[uid];
    if(!p) continue;
    const irVal = ir || p.ir || null;
    const ir_d=irVal?irVal:'—';
    const wn=p.wn||''; const wc=p.wc||0;
    const bn=p.bn||''; const bc=p.bc||0;
    rowsHtml+=`<tr class="pref-row" data-ds="${g=='ms'?'MSD':'WSD'}" data-uid="${uid}" onclick="toggleExpDyn(this)" data-u="${esc(p.u)}" data-ep="${p.ep||0}" data-ee="${p.ee||0}" data-ec="${p.ec||0}" data-wc="${wc}" data-bc="${bc}" data-ir="${irVal||9999}"><td class="tn ir">${ir_d}</td><td class="tu">${p.u}</td><td class="tn">${p.ep||0}</td><td class="tn r">${p.ee||0}</td><td class="tn g">${p.ec||0}</td><td class="tw">${wn?wn+'（'+wc+'次）':'—'}</td><td class="tw g">${bn?bn+'（'+bc+'次）':'—'}</td><td class="tp">${p.cp||'—'}</td><td class="tp">${p.fp||'—'}</td></tr>`;
  }
  
  function mth(col,key,t,cls=''){return `<th${cls?' class="'+cls+'"':''} onclick="srt('${tab}',${col},'${key}')">${t}</th>`;}
  const hdrHtml=`<thead><tr>${mth(0,'ir','即时排名','sd')}${mth(1,'user','用户名')}${mth(2,'ep','参加站数')}${mth(3,'ee','淘汰站数')}${mth(4,'ec','夺冠站数')}${mth(5,'wc','克星球员')}${mth(6,'bc','福星球员')}${mth(7,'champ','带用户夺冠')}${mth(8,'final','带用户夺亚')}</tr></thead>`;
  
  const champCnt=Object.values(dict).filter(p=>p&&(p.ec||0)>0).length;
  cont.innerHTML=`<div class="yearbar"><span class="dev-note">统计范围</span><select class="select-mini" id="year-${tab}" onchange="renderPrefYear('${g}',this.value)"><option selected>2026</option><option>2025</option><option>2024</option><option>全部</option></select></div><div class="kpi"><div class="kc"><div class="kn nt">${order.length}</div><div class="kl">参与用户</div></div><div class="kc"><div class="kn na">${champCnt}</div><div class="kl">有夺冠经历</div></div></div><p style="font-size:12px;color:#9a7a40;margin-bottom:8px">💡 点击任意行展开该用户详细数据，再点一次收起</p><div class="toolbar"><input id="q-${tab}" placeholder="🔍 搜索..." oninput="doFilter('${tab}')"></div><div class="tbl-wrap"><table id="tbl-${tab}">${hdrHtml}<tbody id="tb-${tab}">${rowsHtml}</tbody></table></div>`;
  cont.style.display='block';
}

// ===== 展开行（使用 preference.json 里的 detail） =====
function toggleExpDyn(row){
  const g=row.dataset.ds==='MSD'?'ms':'ws';
  const uid=row.dataset.uid;
  let er=row.nextElementSibling;
  if(!er||!er.classList.contains('exp-row')){
    er=document.createElement('tr');er.className='exp-row';
    er.innerHTML='<td colspan="9"></td>';
    row.parentNode.insertBefore(er,row.nextSibling);
  }
  if(er.classList.contains('open')){er.classList.remove('open');return;}
  const p=PDATA&&PDATA[g]&&PDATA[g][uid];
  if(!p||!p.d){er.querySelector('td').innerHTML='<div class="exp-inner">暂无详细数据</div>';er.classList.add('open');return;}
  const d=p.d;
  function mkTags(arr,cls=''){return (arr||[]).map(n=>`<span class="exp-tag ${cls}">${n}</span>`).join('');}
  function mkSubs(obj,cls=''){return Object.entries(obj||{}).sort((a,b)=>b[1].length-a[1].length).map(([pl,evs])=>`<div class="exp-sub"><div class="exp-sub-t">${pl}（${evs.length}次）</div><div>${evs.map(e=>`<span class="exp-tag ${cls}">${e}</span>`).join('')}</div></div>`).join('');}
  let secs=[];
  if(d.p && d.p.length) secs.push(`<div class="exp-sec"><h5>参加了哪些站</h5><div class="exp-tags">${mkTags(d.p)}</div></div>`);
  if(d.e && d.e.length) secs.push(`<div class="exp-sec"><h5>哪些站淘汰</h5><div class="exp-tags">${mkTags(d.e,'r')}</div></div>`);
  if(d.c && d.c.length) secs.push(`<div class="exp-sec"><h5>哪些站夺冠🏆</h5><div class="exp-tags">${mkTags(d.c,'g')}</div></div>`);
  if(d.el && Object.keys(d.el).length) secs.push(`<div class="exp-sec"><h5>克星球员⚔️</h5>${mkSubs(d.el,'r')}</div>`);
  if(d.ad && Object.keys(d.ad).length) secs.push(`<div class="exp-sec"><h5>福星球员🍀(Top5)</h5>${mkSubs(d.ad,'g')}</div>`);
  if(d.ch && Object.keys(d.ch).length) secs.push(`<div class="exp-sec"><h5>夺冠球员🏆</h5>${mkSubs(d.ch,'g')}</div>`);
  if(d.fi && Object.keys(d.fi).length) secs.push(`<div class="exp-sec"><h5>夺亚球员🎯</h5>${mkSubs(d.fi)}</div>`);
  er.querySelector('td').innerHTML=`<div class="exp-inner"><div class="exp-grid">${secs.join('')}</div></div>`;
  er.classList.add('open');
}

// ===== 通用功能 =====
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function switchTab(t,btn){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));document.getElementById('p-'+t).classList.add('on');btn.classList.add('on');}
function setF(tab,f,btn){FS[tab]=f;btn.closest('.toolbar').querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');doFilter(tab);}
function doFilter(tab){const q=(document.getElementById('q-'+tab)||{value:''}).value.toLowerCase();const f=FS[tab]||'all';document.querySelectorAll('#tb-'+tab+' tr.pref-row,#tb-'+tab+' tr[data-status]').forEach(r=>{const u=(r.dataset.u||r.dataset.user||'').toLowerCase();let ok=u.includes(q);if(f==='alive'&&r.dataset.status!=='alive')ok=false;if(f==='filled'&&r.dataset.filled!=='1')ok=false;r.style.display=ok?'':'none';const er=r.nextElementSibling;if(er&&er.classList.contains('exp-row')){if(!ok){er.style.display='none';er.classList.remove('open')}else er.style.display='';} });}
function srt(tab,col,key){const k=tab+'_'+col;if(!SS[k])SS[k]=0;SS[k]=(SS[k]+1)%3;const dir=SS[k];const ths=document.querySelectorAll('#tbl-'+tab+' thead th');ths.forEach(t=>t.classList.remove('sa','sd'));const tb=document.getElementById('tb-'+tab);const pairs=[];const allRows=Array.from(tb.rows);for(let i=0;i<allRows.length;i++){const r=allRows[i];if(r.classList.contains('pref-row')||r.dataset.status){const exp=allRows[i+1]&&allRows[i+1].classList.contains('exp-row')?allRows[i+1]:null;pairs.push({row:r,exp});}}const nk=['cr','ir','this','deduct','instant','chg','day','ep','ee','ec','wc','bc'];if(dir===0){pairs.sort((a,b)=>parseInt(a.row.dataset.ir||9999)-parseInt(b.row.dataset.ir||9999));if(ths[1])ths[1].classList.add('sd');}else{ths[col].classList.add(dir===1?'sa':'sd');const desc=(dir===1);pairs.sort((a,b)=>{if(nk.includes(key))return desc?(parseFloat(b.row.dataset[key]||0)-parseFloat(a.row.dataset[key]||0)):(parseFloat(a.row.dataset[key]||0)-parseFloat(b.row.dataset[key]||0));const va=(a.row.dataset.user||a.row.dataset.u||'').toLowerCase();const vb=(b.row.dataset.user||b.row.dataset.u||'').toLowerCase();return desc?vb.localeCompare(va):va.localeCompare(vb);})}pairs.forEach(pair=>{tb.appendChild(pair.row);if(pair.exp)tb.appendChild(pair.exp);});doFilter(tab);}

// 运势

function renderPrefYear(g, year){
  if(!HIST_DATA || !HIST_DATA.preference_by_year || !HIST_DATA.preference_by_year[year]) return;
  const pack = HIST_DATA.preference_by_year[year];
  const obj = {updated_at: HIST_DATA.updated_at || '', ms: pack.ms || [], ws: pack.ws || []};
  PDATA = obj;
  renderPref(g, obj);
  setTimeout(()=>{
    const y = document.getElementById('year-' + g + '-p');
    if(y) y.value = year;
  }, 0);
}
function renderDisaster(g,year='2026'){const list=(HIST_DATA.disasters[year]&&HIST_DATA.disasters[year][g])||[]; const cont=document.getElementById('content-'+g+'-t'); const title=g==='ms'?'历史上的惨案-ATP':'历史上的惨案-WTA'; cont.innerHTML=`<div class="yearbar"><div style="font-size:15px;font-weight:800;color:#dc2626">${title}</div><select class="select-mini" onchange="renderDisaster('${g}',this.value)"><option ${year==='2026'?'selected':''}>2026</option><option ${year==='2025'?'selected':''}>2025</option><option ${year==='2024'?'selected':''}>2024</option></select></div><div class="tbl-wrap"><table><thead><tr><th>#</th><th>刽子手</th><th>赛站</th><th>轮次</th><th>受害人数</th><th>辣评</th></tr></thead><tbody>${list.slice(0,50).map(x=>`<tr><td class="tn">#${x.rank}</td><td style="font-weight:800;color:#dc2626">${x.player}</td><td><span class="exp-tag r">${x.event}</span></td><td class="tn">Day${Number(x.day)+1}</td><td class="tn y">${x.count}人</td><td style="font-size:12px;color:#78450a;line-height:1.6">${x.comment}</td></tr>`).join('')}</tbody></table></div>`;}
function initFlightSelect(){const y=document.getElementById('flight-year').value; const sel=document.getElementById('flight-select'); sel.innerHTML=''; if(y==='2026') sel.add(new Option('2026 罗马 ATP/WTA','__current_rome__',true,true)); Object.keys(HIST_DATA.flights[y]||{}).forEach((k,i)=>sel.add(new Option(k,k,y!=='2026'&&i===0,y!=='2026'&&i===0))); renderFlights();}
function renderFlights(){const y=document.getElementById('flight-year').value; const k=document.getElementById('flight-select').value; let arr=[]; if(k==='__current_rome__'){arr=[...((HIST_DATA.flights[y]||{})['2026 罗马 ATP']||[]),...((HIST_DATA.flights[y]||{})['2026 罗马 WTA']||[])].sort((a,b)=>(a.day-b.day)||(a.g>b.g?1:-1));}else{arr=(HIST_DATA.flights[y]||{})[k]||[];} document.getElementById('flight-box').innerHTML=arr.map(x=>`<div class="flight-card"><div class="flight-day">Day ${Number(x.day)+1}</div><div style="font-size:12px;color:#9a7a40;font-weight:700;margin-bottom:6px">${x.g} 航线</div><span class="flight-pill">${x.alive}存活</span><span class="flight-pill r">${x.out}淘汰</span><span class="flight-pill">${x.suicide}自杀</span><span class="flight-pill">${x.retired}退赛</span><div style="font-size:12px;color:#78450a;margin-top:7px"><b>主要航班：</b>${x.top}</div></div>`).join('');}

function setFortune(g,btn){fGender=g;document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.getElementById('fortune-player').textContent='？？？';document.getElementById('fortune-attr').textContent='未摇签';document.getElementById('fortune-text').textContent='点击下方按钮，开始今日运势抽签';document.getElementById('fortune-yi').innerHTML='';}
function drawFortune(){const key='fortune_'+fGender;const today=new Date().toISOString().slice(0,10);let rec=JSON.parse(localStorage.getItem(key)||'{}');if(rec.date!==today)rec={date:today,count:0};if(rec.count>=3){document.getElementById('fortune-player').textContent='命运是测不准的';document.getElementById('fortune-attr').textContent='明日再问';document.getElementById('fortune-text').textContent='命运是测不准的。明天再来吧';document.getElementById('fortune-yi').innerHTML='';return;}rec.count++;localStorage.setItem(key,JSON.stringify(rec));const pool=fGender==='atp'?MSPOOL:WSPOOL;if(!pool||!pool.length){document.getElementById('fortune-player').textContent='暂无数据';return;}const player=pool[Math.floor(Math.random()*pool.length)];const f=HIST_DATA.fortunes[Math.floor(Math.random()*HIST_DATA.fortunes.length)];const card=document.getElementById('fortune-card');card.classList.remove('shake');void card.offsetWidth;card.classList.add('shake');document.getElementById('fortune-player').textContent=player;document.getElementById('fortune-attr').textContent=f.attr+'（今日还可抽'+(3-rec.count)+'次）';document.getElementById('fortune-text').textContent=f.text;document.getElementById('fortune-yi').innerHTML=`宜：${f.yi}<br>忌：${f.ji}`;}
